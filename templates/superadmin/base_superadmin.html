{% extends 'base.html' %}
{% load static user_tags %}

{% block sidebar %}
<aside class="hidden md:flex w-64 flex-col bg-white text-slate-600 border-r border-slate-200">
    <div class="p-6">
        <!-- Tikras Logotipas -->
        <div class="mb-8 px-2">
            <a href="{% url 'home' %}" class="block outline-none">
                <img src="{% static 'images/logo.png' %}" alt="Kudosly.lt" class="h-8 w-auto object-contain">
            </a>
        </div>

        <nav class="space-y-1">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-4">Pagrindinis</p>
            <a href="{% url 'superadmin_dashboard' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_dashboard' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z" />
                </svg>
                <span class="font-semibold">Dashboard</span>
            </a>
            <a href="{% url 'superadmin_companies_list' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_companies_list' or request.resolver_match.url_name == 'superadmin_company_detail' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
                <span class="font-semibold">Įmonės</span>
            </a>
            <a href="{% url 'superadmin_users_list' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_users_list' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0Zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0Z" />
                </svg>
                <span class="font-semibold">Vartotojai</span>
            </a>

            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-4 px-4">Finansai ir AI</p>
            <a href="{% url 'superadmin_billing_overview' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_billing_overview' or request.resolver_match.url_name == 'superadmin_company_billing' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                </svg>
                <span class="font-semibold">Sąskaitos</span>
            </a>
            <a href="{% url 'superadmin_ai_analytics' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_ai_analytics' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
                <span class="font-semibold">AI analitika</span>
            </a>

            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-4 px-4">Valdymas</p>
            <a href="{% url 'superadmin_superusers_list' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if 'superusers' in request.path %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
                <span class="font-semibold">Supervartotojai</span>
            </a>
            <a href="{% url 'superadmin_create_company' %}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition {% if request.resolver_match.url_name == 'superadmin_create_company' %}bg-indigo-50 text-indigo-600 shadow-sm{% else %}text-slate-600 hover:bg-slate-50 hover:text-indigo-600{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                <span class="font-semibold">Kurti įmonę</span>
            </a>
        </nav>
    </div>

    <div class="mt-auto p-6 border-t border-slate-100 bg-slate-50/50">
        <div class="flex items-center gap-3">
            <img src="{{ user|user_avatar }}" class="w-10 h-10 rounded-full object-cover border border-slate-200" alt="Admin">
            <div class="overflow-hidden">
                <p class="text-sm font-bold text-slate-800 truncate">{{ request.user.get_full_name|default:"Superadmin" }}</p>
                <a href="{% url 'logout' %}" class="text-xs text-indigo-600 font-semibold hover:text-indigo-800 transition">Atsijungti</a>
            </div>
        </div>
    </div>
</aside>
{% endblock %}
