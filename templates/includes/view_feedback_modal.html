<!-- View Feedback Modal -->
<div id="viewFeedbackModal" class="fixed inset-0 overflow-y-auto bg-black/40 backdrop-blur-md flex items-center justify-center p-4 z-50 transition-all duration-500 hidden" style="z-index: 50;">
    <div class="bg-white w-full max-w-xl rounded-t-[24px] sm:rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.2)] flex flex-col max-h-[95vh] sm:max-h-[90vh] overflow-hidden transition-all animate-in fade-in zoom-in duration-300 border border-white/20">
        
        <!-- Header -->
        <div class="px-5 sm:px-8 pt-6 sm:pt-8 pb-4 flex justify-between items-center border-b border-gray-50 flex-shrink-0">
            <h2 class="text-xl sm:text-2xl font-extrabold tracking-tight text-gray-900">Atsiliepimo Peržiūra</h2>
            <button type="button" onclick="closeViewModal()" class="p-2 hover:bg-gray-100 rounded-full text-gray-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <!-- Scrollable Content -->
        <div class="px-5 sm:px-8 py-4 sm:py-6 overflow-y-auto space-y-5 flex-grow custom-scrollbar">
            <div class="space-y-4">
                <!-- Pagrindinė informacija -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                        <div class="flex items-center gap-2 mb-2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>
                            <span class="text-[11px] font-bold uppercase tracking-wider">Projektas</span>
                        </div>
                        <p id="viewModalProject" class="text-[14px] sm:text-[15px] text-gray-800 font-semibold"></p>
                    </div>
                    
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                        <div class="flex items-center gap-2 mb-2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                            <span class="text-[11px] font-bold uppercase tracking-wider">Užpildymo data</span>
                        </div>
                        <p id="viewModalDate" class="text-[13px] sm:text-[14px] text-gray-800 font-medium"></p>
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                    <div class="flex items-center gap-2 mb-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span class="text-[11px] font-bold uppercase tracking-wider">Vertino</span>
                    </div>
                    <p id="viewModalRName" class="text-[13px] sm:text-[14px] text-gray-800 font-medium"></p>
                </div>

                <!-- Raktažodžiai -->
                <div id="viewModalKeywordsSection" class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all hidden">
                    <div class="flex items-center gap-2 mb-3 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-tags"><path d="M9 5H2v7l6.29 6.29c.94.94 2.48.94 3.41 0L17 13l-5-5V2h-3"/><path d="M6 9V2h3"/><path d="M15 5h6v6"/><path d="M21 5l-4.71 4.71"/></svg>
                        <span class="text-[11px] font-bold uppercase tracking-wider">Raktažodžiai</span>
                    </div>
                    <div id="viewModalKeywords" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Įvertinimai (Rodikliai) -->
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 sm:p-5 transition-all">
                    <div class="flex items-center gap-2 mb-4 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bar-chart-3"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                        <span class="text-[11px] font-bold uppercase tracking-wider">Įvertinimai</span>
                    </div>
                    <div id="viewModalRatingsContainer" class="flex flex-wrap gap-2">
                        <!-- Standard ratings will be injected here -->
                    </div>
                    <div id="viewModalTraitsContainer" class="mt-4 pt-4 border-t border-gray-200 hidden">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Specifiniai rodikliai</p>
                        <div id="viewModalTraitsList" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <!-- Tekstinis atsiliepimas -->
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                    <div class="flex items-center gap-2 mb-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
                        <span class="text-[11px] font-bold uppercase tracking-wider">Komentaras</span>
                    </div>
                    <p id="viewModalFeedback" class="text-[13px] sm:text-[14px] text-gray-800 whitespace-pre-wrap leading-relaxed"></p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-5 sm:p-8 border-t border-gray-50 flex-shrink-0">
            <button type="button" onclick="closeViewModal()" class="w-full bg-[#2d4a77] hover:bg-[#233a5e] text-white py-3.5 sm:py-4 rounded-2xl font-bold text-[15px] shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                Uždaryti
            </button>
        </div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
    }
</style>

<script>
    const ratingLabels = {
        1: { label: "Mokosi", color: "bg-orange-100 text-orange-700" },
        2: { label: "Daro", color: "bg-yellow-100 text-yellow-700" },
        3: { label: "Varo", color: "bg-blue-100 text-blue-700" },
        4: { label: "Pavyzdys", color: "bg-emerald-100 text-emerald-700" }
    };

    function createRatingRow(label, score) {
        const rating = ratingLabels[score] || { label: "Nežinoma", color: "bg-gray-100 text-gray-600" };
        return `
            <div class="flex items-center gap-2 bg-white border border-gray-100 px-3 py-1.5 rounded-xl shadow-sm">
                <span class="text-[13px] font-medium text-gray-700">${label}:</span>
                <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${rating.color}">${rating.label}</span>
            </div>
        `;
    }

    function openViewModal(data) {
        const dataset = data.dataset || {};
        document.getElementById('viewFeedbackModal').classList.remove('hidden');
        document.getElementById('viewModalProject').textContent = dataset.project || '';
        document.getElementById('viewModalRName').textContent = dataset.rname || '';
        document.getElementById('viewModalDate').textContent = dataset.date || 'Nėra datos';
        document.getElementById('viewModalFeedback').textContent = dataset.feedback || dataset.comments || 'Nėra komentaro';

        // Keywords
        const keywordsContainer = document.getElementById('viewModalKeywords');
        const keywordsSection = document.getElementById('viewModalKeywordsSection');
        keywordsContainer.innerHTML = '';
        const keywords = dataset.keywords ? dataset.keywords.split(',').map(k => k.trim()).filter(k => k) : [];
        if (keywords.length > 0) {
            keywordsSection.classList.remove('hidden');
            keywords.forEach(kw => {
                const span = document.createElement('span');
                span.className = 'px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-medium border border-blue-100';
                span.textContent = kw;
                keywordsContainer.appendChild(span);
            });
        } else {
            keywordsSection.classList.add('hidden');
        }

        // Standard Ratings
        const ratingsContainer = document.getElementById('viewModalRatingsContainer');
        ratingsContainer.innerHTML = '';
        
        const standardRatings = [
            { label: 'Komandinis Darbas', score: parseInt(dataset.teamwork) },
            { label: 'Komunikacija', score: parseInt(dataset.communication) },
            { label: 'Iniciatyvumas', score: parseInt(dataset.initiative) },
            { label: 'Techninės Žinios', score: parseInt(dataset.technical) },
            { label: 'Problemų Sprendimas', score: parseInt(dataset.problem) },
            { label: 'Bendras įvertinimas', score: parseInt(dataset.rating) }
        ];

        standardRatings.forEach(r => {
            if (!isNaN(r.score) && r.score > 0) {
                ratingsContainer.innerHTML += createRatingRow(r.label, r.score);
            }
        });

        // Trait Ratings
        const traitsContainer = document.getElementById('viewModalTraitsContainer');
        const traitsList = document.getElementById('viewModalTraitsList');
        traitsList.innerHTML = '';
        
        try {
            if (dataset.traits) {
                const traits = JSON.parse(dataset.traits);
                if (traits && traits.length > 0) {
                    traitsContainer.classList.remove('hidden');
                    traits.forEach(t => {
                        traitsList.innerHTML += createRatingRow(t.name, t.rating);
                    });
                } else {
                    traitsContainer.classList.add('hidden');
                }
            } else {
                traitsContainer.classList.add('hidden');
            }
        } catch (e) {
            console.error('Error parsing traits:', e);
            traitsContainer.classList.add('hidden');
        }
    }

    function closeViewModal() {
        document.getElementById('viewFeedbackModal').classList.add('hidden');
    }
</script>
