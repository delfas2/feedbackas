<!-- View Feedback Modal -->
<div id="viewFeedbackModal" class="fixed inset-0 overflow-y-auto h-full w-full hidden transition-opacity"
    style="background-color: rgba(75, 85, 99, 0.5); z-index: 50;">
    <div class="relative top-20 mx-auto w-11/12 sm:max-w-2xl border shadow-xl rounded-xl bg-white overflow-hidden">
        <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
            <h3 class="text-xl font-bold text-gray-900 mb-2">Atsiliepimo Peržiūra 🔎</h3>
            <p class="text-gray-600 mb-5 text-sm border-b pb-4">
                Projektas: <strong id="viewModalProject" class="text-purple-600"></strong> | Vertino: <strong
                    id="viewModalRName"></strong> | Data: <span id="viewModalDate"></span>
            </p>

            <div class="space-y-6">
                <div>
                    <h4
                        class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-2 flex items-center justify-between">
                        <span>Bendras Įvertinimas</span>
                        <span id="viewModalRating"
                            class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-sm font-bold"></span>
                    </h4>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Atsiliepimas:</h4>
                    <p id="viewModalFeedback" class="text-gray-800 whitespace-pre-wrap"></p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg" id="viewModalCommentsContainer">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Papildomi komentarai:
                    </h4>
                    <p id="viewModalComments" class="text-gray-800 whitespace-pre-wrap italic"></p>
                </div>
            </div>
        </div>
        <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
            <button type="button" onclick="closeViewModal()"
                class="mt-3 inline-flex w-full justify-center rounded-lg bg-white px-5 py-2 text-sm font-medium text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">
                Uždaryti
            </button>
        </div>
    </div>
</div>

<script>
    function openViewModal(data) {
        document.getElementById('viewFeedbackModal').classList.remove('hidden');
        document.getElementById('viewModalProject').textContent = data.project || data.dataset?.project;
        document.getElementById('viewModalRName').textContent = data.rname || data.dataset?.rname;
        document.getElementById('viewModalDate').textContent = data.date || data.dataset?.date;
        document.getElementById('viewModalRating').textContent = (data.rating || data.dataset?.rating) + '/4';
        document.getElementById('viewModalFeedback').textContent = data.feedback || data.dataset?.feedback;

        const comments = data.comments || data.dataset?.comments;
        const commentsContainer = document.getElementById('viewModalCommentsContainer');
        if (comments && comments.trim() !== 'None' && comments.trim() !== '') {
            document.getElementById('viewModalComments').textContent = comments;
            commentsContainer.classList.remove('hidden');
        } else {
            commentsContainer.classList.add('hidden');
        }
    }

    function closeViewModal() {
        document.getElementById('viewFeedbackModal').classList.add('hidden');
    }
</script>
