<!-- View Feedback Modal -->
<div id="viewFeedbackModal" class="fixed inset-0 overflow-y-auto bg-black/40 backdrop-blur-md flex items-center justify-center p-4 z-50 transition-all duration-500 hidden" style="z-index: 50;">
    <div class="bg-white/95 w-full max-w-xl rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.2)] overflow-hidden transition-all animate-in fade-in zoom-in duration-300 border border-white/20">
        
        <div class="px-6 sm:px-8 pt-8 pb-4 flex justify-between items-center">
            <h2 class="text-2xl font-extrabold tracking-tight text-gray-900">Atsiliepimo Peržiūra</h2>
            <button type="button" onclick="closeViewModal()" class="p-2 hover:bg-gray-100 rounded-full text-gray-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <div class="px-6 sm:px-8 py-4 space-y-5">
            <div class="space-y-4">
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                    <div class="flex items-center gap-2 mb-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>
                        <span class="text-[12px] font-bold uppercase tracking-wider">Projektas</span>
                    </div>
                    <p id="viewModalProject" class="text-[15px] text-gray-800 font-semibold"></p>
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1 bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                        <div class="flex items-center gap-2 mb-2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <span class="text-[12px] font-bold uppercase tracking-wider">Vertino</span>
                        </div>
                        <p id="viewModalRName" class="text-[14px] text-gray-800 font-medium"></p>
                    </div>

                    <div class="flex-1 bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                        <div class="flex items-center gap-2 mb-2 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                            <span class="text-[12px] font-bold uppercase tracking-wider">Data</span>
                        </div>
                        <p id="viewModalDate" class="text-[14px] text-gray-800 font-medium"></p>
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all flex items-center justify-between">
                    <div class="flex items-center gap-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        <span class="text-[12px] font-bold uppercase tracking-wider">Bendras Įvertinimas</span>
                    </div>
                    <span id="viewModalRating" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-bold"></span>
                </div>

                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 transition-all">
                    <div class="flex items-center gap-2 mb-2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
                        <span class="text-[12px] font-bold uppercase tracking-wider">Atsiliepimas</span>
                    </div>
                    <p id="viewModalFeedback" class="text-[14px] text-gray-800 whitespace-pre-wrap leading-relaxed"></p>
                </div>
            </div>
        </div>

        <div class="p-6 sm:p-8 flex gap-3">
            <button type="button" onclick="closeViewModal()" class="w-full bg-[#2d4a77] hover:bg-[#233a5e] text-white py-4 rounded-2xl font-bold text-[15px] shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                Uždaryti
            </button>
        </div>
    </div>
</div>

<script>
    function openViewModal(data) {
        document.getElementById('viewFeedbackModal').classList.remove('hidden');
        document.getElementById('viewModalProject').textContent = data.project || data.dataset?.project;
        document.getElementById('viewModalRName').textContent = data.rname || data.dataset?.rname;
        document.getElementById('viewModalDate').textContent = data.date || data.dataset?.date;
        document.getElementById('viewModalRating').textContent = (data.rating || data.dataset?.rating) + '/4';
        document.getElementById('viewModalFeedback').textContent = data.feedback || data.dataset?.feedback;
    }

    function closeViewModal() {
        document.getElementById('viewFeedbackModal').classList.add('hidden');
    }
</script>
