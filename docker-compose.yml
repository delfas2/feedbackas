services:
  db:
    image: postgres:13
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    command: sh -c "npm install && npm run build && python manage.py collectstatic --noinput && python manage.py migrate && gunicorn feedbackas.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    # Port mapping is defined in docker-compose.override.yml for local development
    expose:
      - "8000"
    labels:
      - traefik.enable=true

      # --- HTTPS Router (production) ---
      - traefik.http.routers.orbigrow.rule=Host(`orbigrow.lt`) || Host(`www.orbigrow.lt`)
      - traefik.http.routers.orbigrow.entrypoints=websecure
      - traefik.http.routers.orbigrow.tls.certresolver=letsencrypt
      - traefik.http.routers.orbigrow.tls.options=secure-tls@docker
      - traefik.http.routers.orbigrow.middlewares=security-headers@docker
      - traefik.http.services.orbigrow.loadbalancer.server.port=8000
      - traefik.docker.network=traefik-proxy

      # --- HTTP → HTTPS Redirect Router ---
      - traefik.http.routers.orbigrow-http.rule=Host(`orbigrow.lt`) || Host(`www.orbigrow.lt`)
      - traefik.http.routers.orbigrow-http.entrypoints=web
      - traefik.http.routers.orbigrow-http.middlewares=redirect-to-https@docker
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true

      # --- Security Headers Middleware (HSTS for A+ grade) ---
      - traefik.http.middlewares.security-headers.headers.stsSeconds=63072000
      - traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.security-headers.headers.stsPreload=true
      - traefik.http.middlewares.security-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.security-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.security-headers.headers.frameDeny=true
      - traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=upgrade-insecure-requests

      # --- TLS Options (TLS 1.2+ only) ---
      - traefik.tls.options.secure-tls.minVersion=VersionTLS12
    networks:
      - traefik-proxy
      - default
    depends_on:
      - db
      - redis
    restart: unless-stopped
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    # Do not publish Redis publicly

  worker:
    build: .
    command: sh -c "python manage.py qcluster"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    env_file:
      - .env

volumes:
  postgres_data:

networks:
  traefik-proxy:
    external: true
