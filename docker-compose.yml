version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    # env_file:
    #   - .env

  web:
    build: .
    command: sh -c "npm install && npm run build && python manage.py collectstatic --noinput && gunicorn feedbackas.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    # env_file:
    #   - .env
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: sh -c "python manage.py qcluster"
    volumes:
      - .:/app
    # env_file:
    #   - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
